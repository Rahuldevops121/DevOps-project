apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-platform-app
  namespace: devops-platform
  labels:
    app: devops-platform-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-platform-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: devops-platform-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3000"
    spec:
      containers:
        - name: app
          image: rahuldock44/devops-platform-app:latest
          ports:
            - containerPort: 3000
          env:
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: "http://jaeger-collector.monitoring.svc.cluster.local:4318/v1/traces"
            - name: OTEL_SERVICE_NAME
              value: "devops-platform-app"
            - name: SERVICE_NAME
              value: "devops-platform-app"
            - name: SERVICE_VERSION
              value: "1.0.0"
            - name: NODE_ENV
              value: "production"
          envFrom:
            - configMapRef:
                name: devops-platform-config
            - secretRef:
                name: devops-platform-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
