apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-platform-app
  namespace: devops-platform
  labels:
    app: devops-platform-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-platform-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: devops-platform-app
      annotations:                              
        prometheus.io/scrape: "true"            # tells Prometheus to scrape this pod
        prometheus.io/path: "/metrics"          # metrics endpoint
        prometheus.io/port: "3000"              # app port
    spec:
      containers:
        - name: app
          image: rahuldock44/devops-platform-app:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: devops-platform-config
            - secretRef:
                name: devops-platform-secrets   # all secrets injected as env vars
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health              
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
